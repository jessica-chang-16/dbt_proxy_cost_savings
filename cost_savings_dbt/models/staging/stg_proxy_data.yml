version: 2

sources:
  - name: google_sheets_raw_proxy
    description: >
      This is the raw data file containing retailer and proxy information. If tested in this yml file, it will test the raw data straight from bigquery before staging layer.
    database: cost-savings-tl
    schema: analytics
    tables:
      - name: proxy_raw_data
    
models:
  - name: stg_proxy_data
    description: >
      Cleaned and standardized proxy data
    columns:
      - name: brand
        description: >
          The brand related to specific retailer.
        data_tests:
          - not_null
      - name: proxy
        description: >
          Name of the third-party proxy that is being used on this specific retailer.
        data_tests:
          - not_null