version: 2

sources:
  - name: google_sheets_raw_clients
    description: >
      raw data file containing the retailer information and whether it is whitelisted or not.
    database: cost-savings-tl
    schema: analytics
    tables:
      - name: raw_client_data

models:
  - name: stg_whitelisting_data
    description: >
      Cleaned and standardized client whitelisting data
    columns:
      - name: brand_region
        description: >
          The brand and region related to specific retailer.
        data_tests:
          - not_null
      - name: whitelisted
        description: >
          Tells whether or not the specific brand and region is whitelisted or not.
        data_tests:
          - not_null